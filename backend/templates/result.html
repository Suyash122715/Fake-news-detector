<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Result | Fake News Detector</title>
  <style>
    body {
      height: 100vh;
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      text-align: center;
    }
    .result-container {
      background: #fff;
      color: #333;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      width: 400px;
      animation: fadeIn 1s ease forwards;
    }
    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
    .result-container h2 {
      margin-bottom: 20px;
    }
    .result-container p {
      font-size: 20px;
      font-weight: bold;
    }
    .back-btn {
      margin-top: 30px;
      padding: 12px 20px;
      background-color: #2c5364;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background 0.3s ease;
    }
    .back-btn:hover {
      background-color: #203a43;
    }
  </style>
</head>
<body>
  <div class="result-container">
    <h2>Analysis Result</h2>
    <p>{{ result }}</p>
    <a href="{{ url_for('input') }}" class="back-btn">Check Another News</a>
</div>


</body>
</html>
