<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign Up | Fake News Detector</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .signup-container {
      background: #fff;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      text-align: center;
      width: 320px;
      animation: slideIn 1s ease-out forwards;
      opacity: 0;
    }

    @keyframes slideIn {
      from {
        transform: translateY(-50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .signup-container h2 {
      margin-bottom: 20px;
      color: #333;
      animation: fadeIn 1s ease forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .signup-container input {
      width: 100%;
      padding: 12px 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      transition: all 0.3s ease;
      opacity: 0;
      animation: fadeInInputs 1s forwards;
    }

    .signup-container input:nth-of-type(1) { animation-delay: 0.3s; }
    .signup-container input:nth-of-type(2) { animation-delay: 0.5s; }
    .signup-container input:nth-of-type(3) { animation-delay: 0.7s; }

    @keyframes fadeInInputs {
      from {
        transform: translateY(10px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .signup-container button {
      width: 100%;
      padding: 12px;
      border: none;
      background-color: #2c5364;
      color: #fff;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.3s ease, transform 0.2s ease;
      animation: fadeIn 1s ease forwards;
      animation-delay: 0.9s;
      opacity: 0;
    }

    .signup-container button:hover {
      background-color: #203a43;
      transform: scale(1.05);
    }

    .login-link {
      margin-top: 15px;
      font-size: 14px;
      animation: fadeIn 1s ease forwards;
      animation-delay: 1.1s;
      opacity: 0;
    }

    .login-link a {
      color: #2c5364;
      text-decoration: none;
    }

    .login-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <h2>Create an Account</h2>
    <form action="/signup" method="POST">
      <input type="text" name="fullname" placeholder="Full Name" required />
      <input type="email" name="email" placeholder="Email Address" required />
      <input type="password" name="password" placeholder="Create Password" required />
      <button type="submit">Sign Up</button>
      <p class="login-link">Already have an account? <a href="/">Login here</a></p>
    </form>
  </div>
</body>
</html>
