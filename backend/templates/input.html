<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fake News Detector | Input</title>
  <style>
    /* YOUR ENTIRE EXISTING CSS remains unchanged here */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      height: 100vh;
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    .home-container {
      background: #fff;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      text-align: center;
      width: 400px;
      animation: slideIn 1s ease-out forwards;
      opacity: 0;
    }
    @keyframes slideIn {
      from {
        transform: translateY(-50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
    .home-container h2 {
      margin-bottom: 20px;
      color: #333;
      animation: fadeIn 1s ease forwards;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }
    textarea {
      width: 100%;
      height: 150px;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      resize: none;
      font-size: 15px;
      animation: fadeInInputs 1s forwards;
      animation-delay: 0.4s;
      opacity: 0;
    }
    @keyframes fadeInInputs {
      from {
        transform: translateY(10px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      background-color: #2c5364;
      color: #fff;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 15px;
      transition: background 0.3s ease, transform 0.2s ease;
      animation: fadeIn 1s ease forwards;
      animation-delay: 0.8s;
      opacity: 0;
    }
    button:hover {
      background-color: #203a43;
      transform: scale(1.05);
    }
    #resultBox {
      margin-top: 20px;
      font-size: 16px;
      font-weight: bold;
      color: #333;
      opacity: 0;
      transition: opacity 0.5s;
    }
    #resultBox.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="home-container">
    <h2>📰 Check Your News</h2>
    <p id="newsTypeDisplay" style="margin-bottom: 15px; color: #666;"></p>

    <form action="{{ url_for('analyze') }}" method="POST">
      <!-- hidden input to pass news type to backend -->
      <input type="hidden" name="news_type" value="{{ news_type }}">

      <!-- International dropdown -->
      {% if news_type == "international" %}
        <label for="region" style="display:block; margin-bottom:8px; color:#333;">Select Country:</label>
        <select name="region" id="region" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc; margin-bottom:15px; font-size:15px;">
          {% for country in countries %}
            <option value="{{ country }}">{{ country }}</option>
          {% endfor %}
        </select>
      {% endif %}

      <!-- India local dropdown -->
      {% if news_type == "india_local" %}
        <label for="region" style="display:block; margin-bottom:8px; color:#333;">Select Region:</label>
        <select name="region" id="region" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc; margin-bottom:15px; font-size:15px;">
          {% for region in india_regions %}
            <option value="{{ region }}">{{ region }}</option>
          {% endfor %}
        </select>
      {% endif %}

      <textarea name="newsText" placeholder="Paste news headline or content here..." required></textarea>
      <button type="submit">Check News</button>
    </form>
  </div>

  <script>
    const newsType = "{{ news_type }}";
    const display = document.getElementById("newsTypeDisplay");

    if (newsType === "india_local") {
      display.textContent = "You are verifying: Local Indian News";
    } else if (newsType === "international") {
      display.textContent = "You are verifying: International News";
    } else {
      display.textContent = "You are verifying: Local News";
    }
  </script>
</body>
</html>
