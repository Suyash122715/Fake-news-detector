<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard | Fake News Detector</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    .dashboard-container {
      background: #ffffff;
      color: #333;
      width: 90%;
      max-width: 500px;
      padding: 40px 30px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      animation: fadeIn 1s ease;
    }

    h2 {
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      color: #555;
      margin-bottom: 30px;
    }

    .nav-buttons {
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
    }

    .nav-buttons a {
      display: block;
      width: 100%;
      background-color: #2c5364;
      color: white;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 10px;
      transition: background 0.3s ease, transform 0.2s ease;
      font-size: 16px;
    }

    .nav-buttons a:hover {
      background-color: #203a43;
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="dashboard-container">
    <h2>Welcome, <span id="username">User</span> 👋</h2>
    <p>Check whether a news article is fake or real in seconds!</p>
    <div class="nav-buttons">
      <a href="{{ url_for('search_news') }}">🔍 Submit News for Verification</a>
      <a href="{{ url_for('previous') }}">📜 View Previous Results</a>
      <a href="{{ url_for('how_it_works') }}">🧠 How it Works / About Fake News</a>
      <a href="{{ url_for('logout') }}">👤 Account Settings / Logout</a>
    </div>
  </div>

  <script>
    const userName = localStorage.getItem("username") || "User";
    document.getElementById("username").textContent = userName;
  </script>
</body>
</html>
