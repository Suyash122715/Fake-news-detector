<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Previous Results | Fake News Detector</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      min-height: 100vh;
    }

    .results-container {
      background: #fff;
      color: #333;
      width: 100%;
      max-width: 900px;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      animation: fadeIn 1s ease;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #ccc;
    }

    th {
      background-color: #2c5364;
      color: #fff;
    }

    tr:hover {
      background-color: #f0f0f0;
    }

    .tag {
      padding: 5px 10px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 14px;
    }

    .real {
      background-color: #d4edda;
      color: #155724;
    }

    .fake {
      background-color: #f8d7da;
      color: #721c24;
    }

    .back-button {
      margin-top: 25px;
      display: inline-block;
      text-decoration: none;
      background-color: #2c5364;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      transition: background 0.3s ease;
    }

    .back-button:hover {
      background-color: #203a43;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="results-container">
    <h2>📜 Previous Results</h2>
    <table>
      <tr>
        <th>#</th>
        <th>News Headline</th>
        <th>Date</th>
        <th>Result</th>
      </tr>
      <tr>
        <td>1</td>
        <td>Aliens land in Mumbai, declare peace</td>
        <td>2025-06-07</td>
        <td><span class="tag fake">Fake</span></td>
      </tr>
      <tr>
        <td>2</td>
        <td>Government announces free WiFi across India</td>
        <td>2025-06-07</td>
        <td><span class="tag real">Real</span></td>
      </tr>
      <tr>
        <td>3</td>
        <td>Scientists create water from air in desert</td>
        <td>2025-06-06</td>
        <td><span class="tag real">Real</span></td>
      </tr>
      <tr>
        <td>4</td>
        <td>Moon turns green during eclipse</td>
        <td>2025-06-05</td>
        <td><span class="tag fake">Fake</span></td>
      </tr>
    </table>

    <a href="{{ url_for('home') }}" class="back-button">⬅ Back to Dashboard</a>
  </div>
</body>
</html>
